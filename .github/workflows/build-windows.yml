name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install PyQt6
        pip install SQLAlchemy
        pip install python-dateutil
      shell: cmd
    
    - name: Build EXE
      run: |
        echo "Starting build..."
        pyinstaller --name="LaborLawDB" --windowed --onefile --hidden-import=PyQt6.sip --hidden-import=sqlite3 --clean --noconfirm main.py
        echo "Build completed"
      shell: cmd
    
    - name: Check output
      run: |
        echo "=== Dist Folder ==="
        dir dist\ /s
      shell: cmd
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LaborLawDB-Windows
        path: dist/*.exe
        if-no-files-found: error
