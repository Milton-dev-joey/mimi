name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install PyQt6 SQLAlchemy python-dateutil
      shell: cmd
    
    - name: Build EXE
      run: |
        pyinstaller --name="LaborLawDB" --windowed --onefile --hidden-import=PyQt6.sip --hidden-import=sqlite3 --clean --noconfirm main.py
      shell: cmd
    
    - name: Prepare release files
      run: |
        mkdir release
        copy dist\LaborLawDB.exe release\
        echo ===================================== > release\README.txt
        echo   劳动法数据库 Windows版 >> release\README.txt
        echo ===================================== >> release\README.txt
        echo. >> release\README.txt
        echo 【文件说明】 >> release\README.txt
        echo   LaborLawDB.exe  - 主程序 ^(约80MB^) >> release\README.txt
        echo   laws_dev.db     - 数据库 ^(约50MB，需单独下载^) >> release\README.txt
        echo. >> release\README.txt
        echo 【使用方法】 >> release\README.txt
        echo 1. 下载 LaborLawDB.exe 和 laws_dev.db >> release\README.txt
        echo 2. 将两个文件放在同一文件夹 >> release\README.txt
        echo 3. 双击 LaborLawDB.exe 运行 >> release\README.txt
        echo. >> release\README.txt
        echo 【注意事项】 >> release\README.txt
        echo - 两个文件必须在一起，否则程序无法运行 >> release\README.txt
        echo - 首次启动可能需要几秒钟加载 >> release\README.txt
        echo ===================================== >> release\README.txt
      shell: cmd
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.release_tag }}
        name: "劳动法数据库 Windows版 ${{ github.event.inputs.release_tag }}"
        body: |
          ## 劳动法数据库 Windows版
          
          ### 📦 包含文件
          - `LaborLawDB.exe` - 主程序 (~80MB)
          - `README.txt` - 使用说明
          
          ### 📥 使用方法
          1. 下载 `LaborLawDB.exe` 和 `laws_dev.db`（数据库文件，约50MB）
          2. 将两个文件放在同一文件夹
          3. 双击 `LaborLawDB.exe` 运行
          
          ### ⚠️ 重要提示
          **数据库文件 `laws_dev.db` 需要单独下载放置！**
          
          文件夹结构应为：
          ```
          LaborLawDB.exe
          laws_dev.db
          ```
          
          ### 🔧 功能特性
          - 415部劳动法律法规数据库
          - 按位阶分类浏览
          - 全文检索 + 高级检索
          - 批注管理
          - 案例管理
          - 实务专题
          
          ### 📝 系统要求
          - Windows 10/11
          - 内存：4GB+
          - 磁盘空间：200MB+
        files: |
          release/LaborLawDB.exe
          release/README.txt
        draft: true  # 创建为草稿，等待上传数据库
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LaborLawDB-Windows-EXE
        path: release/
